<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Page Not Found - Frontity Community Archive</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; color: #333; }
    h1 { color: #1f38c5; }
    a { color: #1f38c5; }
    code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }
    .search { margin: 20px 0; }
  </style>
  <script>
    // Try to fix common URL issues and redirect
    (function() {
      var path = window.location.pathname;
      var fixed = path;

      // Strip .html extension
      fixed = fixed.replace(/\.html$/, '');

      // Fix /c/t/... → /t/...
      fixed = fixed.replace(/^\/c\/t\//, '/t/');

      // Strip post numbers: /t/slug/123/45 → /t/slug/123/
      fixed = fixed.replace(/^(\/t\/[^\/]+\/\d+)\/\d+\/?$/, '$1/');

      if (fixed !== path) {
        window.location.href = fixed;
      }
    })();
  </script>
</head>
<body>
  <h1>Page Not Found</h1>
  <p>This is a static archive of the <strong>Frontity Community Forum</strong>. The page you requested doesn't exist in the archive.</p>
  <p><a href="/">← Browse the archive homepage</a></p>
  <p><strong>Possible reasons:</strong></p>
  <ul>
    <li>User profile pages (<code>/u/...</code>) were not archived</li>
    <li>The URL may have changed — try browsing from the <a href="/">homepage</a></li>
  </ul>
</body>
</html>
